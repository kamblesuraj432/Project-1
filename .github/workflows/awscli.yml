name: Three‑Stage CI/CD Pipeline

on:
  push:
    branches:
      - circleci-project-setup

jobs:
  # 🌐 Authentication with AWS
  auth:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::882553102330:role/github-role
          aws-region: ap-south-1

      - name: Verify AWS identity
        run: aws sts get-caller-identity

  # ☁️ Create & Deploy Stage
  create:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::882553102330:role/github-role
          aws-region: ap-south-1

      - name: Create S3 bucket and list
        run: |
          BUCKET_NAME=three-stage-bucket-$(date +%s)
          aws s3 mb s3://$BUCKET_NAME --region ap-south-1
          aws s3 ls
