name: Create S3 Bucket

on:
  workflow_dispatch:   # Allows you to trigger manually from GitHub UI

jobs:
  create-bucket:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::882553102330:role/github-role   # Replace with your IAM role ARN
          aws-region: ap-south-1                                     # Replace with your region

      - name: Create S3 bucket
        run: |
          BUCKET_NAME=my-new-bucket-$(date +%s)
          aws s3 mb s3://$BUCKET_NAME --region ap-south-1
          echo "Created bucket: $BUCKET_NAME"
